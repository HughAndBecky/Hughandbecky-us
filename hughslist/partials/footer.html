<footer id="site-footer"
        vocab="https://schema.org/"
        typeof="WPFooter">

  <!-- Visible copyright line with embedded metadata -->
  <span typeof="WebSite">

    <!-- Year -->
    <span property="copyrightYear">
      2026
      <meta property="copyrightNotice" content="All rights reserved." />
    </span>

    <span> © </span>

    <!-- Copyright holder -->
    <span property="copyrightHolder"
          typeof="Person">
      <span property="name">Hugh Paterson III</span>
      <link property="sameAs" href="https://hp3.me" />
    </span>

    <span> · All rights reserved.</span>

    <!-- WebSite URL -->
    <link property="url" href="https://hughslist.it" />

    <!-- Owner of the WebSite -->
    <span property="owner" typeof="Person">
      <meta property="name" content="Hugh Paterson III" />
      <link property="sameAs" href="https://hp3.me" />
    </span>

  </span>

  <span class="footer-separator"> · </span>

  <!-- Visible slogan with Organization metadata embedded -->
  <span typeof="Organization">

    <!-- Organization name (metadata only) -->
    <meta property="name" content="Hugh’s List" />

    <!-- Founding date -->
    <meta property="foundingDate" content="2025" />

    <!-- Founder -->
    <span property="founder" typeof="Person">
      <meta property="name" content="Hugh Paterson III" />
      <link property="sameAs" href="https://hp3.me" />
    </span>

    <!-- Slogan metadata -->
    <meta property="slogan" content="Built for Language Resource Catalogers with care" />

    <!-- Visible slogan text -->
    <span data-i18n="footer.tagline">
      Built for <i>Language Resource Catalogers</i> with care
    </span>

  </span>

  <!-- Footer Navigation -->
  <nav class="footer-links"
       typeof="SiteNavigationElement">

    <a href="/data-handling.html"
       class="footer-link"
       data-i18n="footer.data_handling"
       property="url">
      Data Practices
    </a>

    <span class="footer-separator"> · </span>

    <a href="/about.html"
       class="footer-link"
       data-i18n="footer.about"
       property="url">
      About
    </a>

  </nav>
</footer>
